# .github/workflows/build-python-reactor.yml
#
# Builds python-reactor.wasm — reactor-mode CPython 3.12 for shimmy-wasm.
#
# Exports: py_init, py_exec, alloc, dealloc, resp_buf, resp_len
#
# Strategy (~10 min):
#   • Download pre-built libpython-3.12.0-wasi-sdk-20.0.tar.gz from vmware-labs
#     (contains headers, libpython3.12.a, and stdlib in usr/).
#   • Compile py_reactor.c with WASI SDK 20.
#   • Link with -mexec-model=reactor against libpython3.12.a.
#   • Pack Python stdlib into the binary with wasi-vfs (same as current aio build).

name: Build python-reactor.wasm

on:
  workflow_dispatch:
  push:
    paths:
      - 'python/reactor/**'
      - '.github/workflows/build-python-reactor.yml'

jobs:
  build:
    name: python-reactor.wasm (WASI SDK 20)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Toolchain ────────────────────────────────────────────────────────

      - name: Install WASI SDK 20
        run: |
          URL="https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-20/wasi-sdk-20.0-linux.tar.gz"
          wget -q "$URL" -O wasi-sdk.tar.gz
          tar xf wasi-sdk.tar.gz
          echo "WASI_SDK=$(pwd)/wasi-sdk-20.0" >> $GITHUB_ENV

      - name: Install wasi-vfs 0.6.3
        run: |
          URL="https://github.com/kateinoigakukun/wasi-vfs/releases/download/v0.6.3/wasi-vfs-cli-x86_64-unknown-linux-gnu.zip"
          wget -q "$URL" -O wasi-vfs.zip
          unzip -q wasi-vfs.zip
          chmod +x wasi-vfs
          echo "$(pwd)" >> $GITHUB_PATH

      # ── Download pre-built libpython ──────────────────────────────────

      - name: Download libpython-3.12.0-wasi-sdk-20.0
        run: |
          BASE="https://github.com/vmware-labs/webassembly-language-runtimes/releases/download/python%2F3.12.0%2B20231211-040d5a6"
          wget -q "${BASE}/libpython-3.12.0-wasi-sdk-20.0.tar.gz"
          mkdir -p libpython
          tar xf libpython-3.12.0-wasi-sdk-20.0.tar.gz -C libpython

      - name: Inspect archive layout and read pkg-config
        run: |
          echo "=== tree (depth 4) ==="
          find libpython -maxdepth 4
          echo ""
          echo "=== pkg-config ==="
          find libpython -name "*.pc" -exec cat {} \;

      # ── Compile ───────────────────────────────────────────────────────

      - name: Compile py_reactor.c
        run: |
          INCLUDE="$(pwd)/libpython/include/python3.12"
          echo "Include dir: ${INCLUDE}"
          test -f "${INCLUDE}/Python.h" || (echo "ERROR: Python.h not found"; exit 1)

          ${WASI_SDK}/bin/clang \
            --target=wasm32-wasi \
            -I "${INCLUDE}" \
            -O2 \
            -Wall \
            -Wno-unused-command-line-argument \
            -c python/reactor/py_reactor.c \
            -o py_reactor.o

      # ── Link ─────────────────────────────────────────────────────────

      - name: Link python-reactor-nostdlib.wasm
        run: |
          LIBPY="$(pwd)/libpython/lib/wasm32-wasi/libpython3.12.a"
          echo "Library: ${LIBPY}"
          test -f "${LIBPY}" || (echo "ERROR: libpython3.12.a not found"; find libpython -name "*.a"; exit 1)

          # Read linker flags from pkg-config file
          PC_LIBS=$(grep "^Libs:" libpython/lib/wasm32-wasi/pkgconfig/*.pc 2>/dev/null | sed 's/^Libs://' | tr -d '\r')
          echo "Libs from .pc: ${PC_LIBS}"

          ${WASI_SDK}/bin/clang \
            --target=wasm32-wasi \
            -mexec-model=reactor \
            py_reactor.o \
            "${LIBPY}" \
            ${PC_LIBS} \
            -Wl,--export=py_init \
            -Wl,--export=py_exec \
            -Wl,--export=alloc \
            -Wl,--export=dealloc \
            -Wl,--export=resp_buf \
            -Wl,--export=resp_len \
            -o python-reactor-nostdlib.wasm

      # ── Pack stdlib ───────────────────────────────────────────────────

      - name: Pack stdlib with wasi-vfs
        run: |
          # The libpython archive includes usr/ (Python stdlib as python312.zip)
          USR_DIR="$(pwd)/libpython/usr"
          echo "Stdlib usr dir: ${USR_DIR}"
          test -d "${USR_DIR}" || (echo "ERROR: usr/ not found"; find libpython -type d; exit 1)

          wasi-vfs pack python-reactor-nostdlib.wasm \
            --mapdir /usr::${USR_DIR} \
            -o python-reactor.wasm

          ls -lh python-reactor.wasm

      # ── Verify exports ────────────────────────────────────────────────

      - name: Verify WASM exports
        run: |
          python3 -c "
          data = open('python-reactor.wasm', 'rb').read()
          missing = []
          for sym in [b'py_init', b'py_exec', b'alloc', b'dealloc', b'resp_buf', b'resp_len']:
              if sym in data:
                  print(f'  OK: {sym.decode()}')
              else:
                  missing.append(sym.decode())
          if missing:
              print(f'MISSING: {missing}')
              exit(1)
          print('All exports present.')
          "

      # ── Upload ────────────────────────────────────────────────────────

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-reactor-wasm
          path: python-reactor.wasm
          retention-days: 90

      - name: Create release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: python-reactor.wasm
          name: ${{ github.ref_name }}
          body: |
            Reactor-mode CPython 3.12 WASM binary.

            Exports: `py_init`, `py_exec`, `alloc`, `dealloc`, `resp_buf`, `resp_len`

            Built from vmware-labs/webassembly-language-runtimes python/3.12.0+20231211-040d5a6
            with py_reactor.c, linked -mexec-model=reactor, stdlib packed via wasi-vfs.
