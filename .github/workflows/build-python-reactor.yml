# .github/workflows/build-python-reactor.yml
#
# Builds python-reactor.wasm — reactor-mode CPython 3.14 for shimmy-wasm.
#
# Exports: py_init, py_exec, alloc, dealloc, resp_buf, resp_len
#
# Strategy:
#   • Download pre-built cpython-3.14-wasi.tar.gz from bkmashiro/wasi-wheels
#     latest release (contains libpython3.14.a, headers, and stdlib).
#   • Download pre-built numpy-static-wasi.tar.gz from bkmashiro/wasi-wheels
#     latest release (contains numpy .a archives + pure Python files).
#   • Download WASI SDK 33.
#   • Compile py_reactor.c with -DHAVE_NUMPY against CPython 3.14 headers.
#   • Link with -mexec-model=reactor against libpython3.14.a + numpy .a files.
#   • Pack Python 3.14 stdlib + numpy pure Python into binary with wasi-vfs.

name: Build python-reactor.wasm

on:
  workflow_dispatch:
  push:
    # Branch pushes: only rebuild when reactor source or this workflow changes.
    branches:
      - main
    paths:
      - 'python/reactor/**'
      - '.github/workflows/build-python-reactor.yml'
    # Tag pushes always trigger a full build + release (no paths filter).
    # auto-tag-reactor.yml creates tags automatically on relevant changes.
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: python-reactor.wasm (CPython 3.14 + WASI SDK 33 + numpy)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Toolchain ────────────────────────────────────────────────────────

      - name: Install WASI SDK 33
        run: |
          HOST_ARCH=$(uname -m | sed -e 's/aarch64/arm64/')
          URL="https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-33/wasi-sdk-33.0-${HOST_ARCH}-linux.tar.gz"
          wget -q "$URL" -O wasi-sdk.tar.gz
          tar xf wasi-sdk.tar.gz
          mv wasi-sdk-33.0-${HOST_ARCH}-linux wasi-sdk-33
          echo "WASI_SDK=$(pwd)/wasi-sdk-33" >> $GITHUB_ENV

      - name: Install wasi-vfs 0.6.3
        run: |
          BASE="https://github.com/kateinoigakukun/wasi-vfs/releases/download/v0.6.3"
          # CLI tool
          wget -q "${BASE}/wasi-vfs-cli-x86_64-unknown-linux-gnu.zip" -O wasi-vfs-cli.zip
          unzip -q wasi-vfs-cli.zip
          chmod +x wasi-vfs
          echo "$(pwd)" >> $GITHUB_PATH
          # Static library (needed at link time to inject wasi_vfs_pack_fs export)
          wget -q "${BASE}/libwasi_vfs-wasm32-unknown-unknown.zip" -O libwasi_vfs.zip
          unzip -q libwasi_vfs.zip
          echo "WASI_VFS_LIB=$(pwd)/libwasi_vfs.a" >> $GITHUB_ENV

      # ── Download pre-built artifacts from wasi-wheels latest release ─────

      - name: Download cpython-3.14-wasi.tar.gz from wasi-wheels
        run: |
          BASE_URL=$(curl -fsSL \
            -H "Authorization: token ${{ secrets.WASI_WHEELS_TOKEN || github.token }}" \
            "https://api.github.com/repos/bkmashiro/wasi-wheels/releases/tags/latest" \
            | python3 -c "import json,sys; assets=json.load(sys.stdin)['assets']; url=[a['browser_download_url'] for a in assets if a['name']=='cpython-3.14-wasi.tar.gz']; print(url[0] if url else '')")
          if [ -z "$BASE_URL" ]; then
            echo "ERROR: cpython-3.14-wasi.tar.gz not found in wasi-wheels latest release"
            exit 1
          fi
          echo "Downloading: $BASE_URL"
          wget -q "$BASE_URL" -O cpython-3.14-wasi.tar.gz
          mkdir -p cpython-wasi
          tar xf cpython-3.14-wasi.tar.gz -C cpython-wasi --strip-components=1
          echo "CPYTHON_WASI=$(pwd)/cpython-wasi" >> $GITHUB_ENV

      - name: Download numpy-static-wasi.tar.gz from wasi-wheels
        run: |
          BASE_URL=$(curl -fsSL \
            -H "Authorization: token ${{ secrets.WASI_WHEELS_TOKEN || github.token }}" \
            "https://api.github.com/repos/bkmashiro/wasi-wheels/releases/tags/latest" \
            | python3 -c "import json,sys; assets=json.load(sys.stdin)['assets']; url=[a['browser_download_url'] for a in assets if a['name']=='numpy-static-wasi.tar.gz']; print(url[0] if url else '')")
          if [ -z "$BASE_URL" ]; then
            echo "ERROR: numpy-static-wasi.tar.gz not found in wasi-wheels latest release"
            exit 1
          fi
          echo "Downloading: $BASE_URL"
          wget -q "$BASE_URL" -O numpy-static-wasi.tar.gz
          mkdir -p numpy-static
          tar xf numpy-static-wasi.tar.gz -C numpy-static --strip-components=1
          echo "NUMPY_STATIC=$(pwd)/numpy-static" >> $GITHUB_ENV

      - name: Install sympy (pure Python — packed via wasi-vfs)
        run: |
          pip install sympy --target /tmp/extra-site --no-deps -q
          echo "sympy installed:"
          ls /tmp/extra-site/

      - name: Inspect layout
        run: |
          echo "=== cpython-wasi layout (depth 3) ==="
          find cpython-wasi -maxdepth 3 -type f | sort | head -40
          echo ""
          echo "=== numpy-static layout (depth 4) ==="
          find numpy-static -maxdepth 4 | sort | head -40

      # ── Compile ───────────────────────────────────────────────────────────

      - name: Compile py_reactor.c
        run: |
          INCLUDE="${CPYTHON_WASI}/include"
          echo "Include dir: ${INCLUDE}"
          test -f "${INCLUDE}/Python.h" || (echo "ERROR: Python.h not found"; find cpython-wasi -name "Python.h"; exit 1)

          ${WASI_SDK}/bin/clang \
            --target=wasm32-wasip1 \
            -I "${INCLUDE}" \
            -DHAVE_NUMPY \
            -O2 \
            -Wall \
            -Wno-unused-command-line-argument \
            -c python/reactor/py_reactor.c \
            -o py_reactor.o

      # ── Link ──────────────────────────────────────────────────────────────

      - name: Link python-reactor-nostdlib.wasm
        run: |
          LIBPY="${CPYTHON_WASI}/libpython3.14.a"
          echo "Library: ${LIBPY}"
          test -f "${LIBPY}" || (echo "ERROR: libpython3.14.a not found"; find cpython-wasi -name "*.a"; exit 1)

          # Collect all numpy .a files
          NUMPY_LIBS=$(find "${NUMPY_STATIC}" -name "*.a" | sort | tr '\n' ' ')
          echo "numpy .a files: ${NUMPY_LIBS}"

          # Collect bundled CPython static libs (libmpdec, Hacl, expat) if present
          EXTRA_LIBS=""
          if [ -d "${CPYTHON_WASI}/extra-libs" ]; then
            EXTRA_LIBS=$(find "${CPYTHON_WASI}/extra-libs" -name "*.a" | sort | tr '\n' ' ')
            echo "extra libs: ${EXTRA_LIBS}"
          fi

          SYSROOT="${WASI_SDK}/share/wasi-sysroot"

          ${WASI_SDK}/bin/clang \
            --target=wasm32-wasip1 \
            --sysroot="${SYSROOT}" \
            -mexec-model=reactor \
            py_reactor.o \
            "${LIBPY}" \
            ${NUMPY_LIBS} \
            ${EXTRA_LIBS} \
            "${WASI_VFS_LIB}" \
            -lwasi-emulated-getpid \
            -lwasi-emulated-signal \
            -lwasi-emulated-process-clocks \
            -Wl,--wrap=strtold \
            -Wl,--wrap=strtold_l \
            -Wl,--allow-undefined \
            -Wl,--export=py_init \
            -Wl,--export=py_exec \
            -Wl,--export=alloc \
            -Wl,--export=dealloc \
            -Wl,--export=resp_buf \
            -Wl,--export=resp_len \
            -Wl,-z,stack-size=2097152 \
            -o python-reactor-nostdlib.wasm

      # ── Pack stdlib + numpy pure Python ──────────────────────────────────

      - name: Pack stdlib and numpy with wasi-vfs
        run: |
          STDLIB_DIR="${CPYTHON_WASI}/lib"
          echo "Stdlib dir: ${STDLIB_DIR}"
          test -d "${STDLIB_DIR}" || (echo "ERROR: stdlib not found"; find cpython-wasi -type d | head -20; exit 1)

          NUMPY_PY_DIR="${NUMPY_STATIC}/numpy"
          echo "Numpy pure Python dir: ${NUMPY_PY_DIR}"
          test -d "${NUMPY_PY_DIR}" || (echo "ERROR: numpy pure Python not found"; find numpy-static -type d; exit 1)

          # Build site-packages dir: numpy + sympy (pure Python)
          mkdir -p /tmp/site-packages
          cp -a "${NUMPY_PY_DIR}" /tmp/site-packages/numpy
          # sympy was installed via pip to /tmp/extra-site; copy the package dir.
          if [ -d /tmp/extra-site/sympy ]; then
            cp -a /tmp/extra-site/sympy /tmp/site-packages/sympy
            echo "sympy packed: $(du -sh /tmp/site-packages/sympy | cut -f1)"
          else
            echo "WARNING: sympy not found in /tmp/extra-site — skipping"
          fi
          ls /tmp/site-packages/

          # wasi-vfs pack: stdlib at /usr/lib/python3.14,
          # site-packages (numpy + sympy) at /usr/lib/python3.14/site-packages.
          wasi-vfs pack python-reactor-nostdlib.wasm \
            --dir "${STDLIB_DIR}"::/usr/lib/python3.14 \
            --dir /tmp/site-packages::/usr/lib/python3.14/site-packages \
            -o python-reactor.wasm

          ls -lh python-reactor.wasm

      # ── Verify exports ────────────────────────────────────────────────────

      - name: Verify WASM exports
        run: |
          python3 -c "
          data = open('python-reactor.wasm', 'rb').read()
          missing = []
          for sym in [b'py_init', b'py_exec', b'alloc', b'dealloc', b'resp_buf', b'resp_len']:
              if sym in data:
                  print(f'  OK: {sym.decode()}')
              else:
                  missing.append(sym.decode())
          if missing:
              print(f'MISSING: {missing}')
              exit(1)
          print('All exports present.')
          "

      # ── Upload ────────────────────────────────────────────────────────────

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-reactor-wasm
          path: python-reactor.wasm
          retention-days: 90

      - name: Create release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: python-reactor.wasm
          name: ${{ github.ref_name }}
          body: |
            Reactor-mode CPython 3.14 WASM binary with numpy built-in.

            Exports: `py_init`, `py_exec`, `alloc`, `dealloc`, `resp_buf`, `resp_len`

            Built from CPython 3.14 + WASI SDK 33 + numpy static archives.
            NumPy C extensions are linked statically (no dynamic linking required).
            Stdlib and numpy pure Python are packed via wasi-vfs.
